<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Морской чек-лист • Сборы в Мурманск</title>
    <style>
        /* ----- СБРОС И БАЗА: ВСЯ ШИРИНА И ВЫСОТА ----- */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body {
            width: 100%;
            min-height: 100vh;           /* занимаем всю высоту экрана */
            background: #0a1a2e;          /* цвет глубокого моря */
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            color: #e8edf0;
            display: flex;
            align-items: stretch;         /* чтобы дочерние блоки тоже растягивались */
        }

        /* ----- ОСНОВНАЯ СЕТКА: карта слева, чек-лист справа ----- */
        .app {
            display: flex;
            flex-wrap: wrap;              /* на узких экранах уходит в колонку */
            width: 100%;
            min-height: 100vh;
        }

        /* ----- ЛЕВАЯ ПОЛОВИНА: МОРСКАЯ КАРТА (фон) ----- */
        .map-side {
            flex: 1 1 45%;                /* занимает 45% ширины */
            background: #0f2640;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.02) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(200, 180, 140, 0.03) 0px, rgba(200, 180, 140, 0.03) 2px, transparent 2px, transparent 8px);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            border-right: 2px solid #3a5f7a;
            box-shadow: inset 0 0 120px rgba(0, 10, 20, 0.7);
            min-height: 400px;
        }

        /* Декоративная "карта" с компасом и линиями */
        .map-side::before {
            content: "";
            position: absolute;
            top: 30px;
            left: 30px;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(200, 180, 140, 0.2);
            border-radius: 50%;
            background: radial-gradient(circle, transparent 45%, rgba(200, 180, 140, 0.1) 48%, transparent 50%);
            box-shadow: 0 0 40px rgba(0, 30, 60, 0.6);
        }
        .map-side::after {
            content: "✦";
            position: absolute;
            top: 52px;
            left: 52px;
            font-size: 28px;
            color: rgba(200, 180, 140, 0.2);
            transform: rotate(15deg);
        }

        .map-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 400px;
        }

        .map-content .ship-icon {
            font-size: 68px;
            display: block;
            margin-bottom: 20px;
            opacity: 0.7;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }

        .map-content h2 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #c9d6db;
            border-bottom: 1px solid rgba(200, 180, 140, 0.2);
            padding-bottom: 16px;
            margin-bottom: 16px;
        }

        .map-content p {
            font-size: 16px;
            line-height: 1.7;
            color: #a0b8c9;
            font-weight: 300;
        }

        .map-content .route {
            margin-top: 30px;
            font-size: 14px;
            letter-spacing: 2px;
            color: #6e8fa0;
            border-top: 1px dashed rgba(200, 180, 140, 0.15);
            padding-top: 20px;
        }

        /* ----- ПРАВАЯ ПОЛОВИНА: ЧЕК-ЛИСТ (стильный, строгий) ----- */
        .checklist-side {
            flex: 1 1 55%;
            background: #0b1a2a;
            padding: 40px 45px 40px 40px;
            overflow-y: auto;              /* если много пунктов — скролл внутри */
            display: flex;
            flex-direction: column;
        }

        /* Шапка чек-листа */
        .checklist-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            border-bottom: 1px solid #1f3a4a;
            padding-bottom: 18px;
            margin-bottom: 28px;
        }

        .checklist-header h1 {
            font-size: 26px;
            font-weight: 400;
            letter-spacing: 3px;
            color: #d6e3e8;
        }

        .checklist-header h1 span {
            font-weight: 200;
            color: #4d7a8f;
        }

        .theme-toggle {
            background: none;
            border: 1px solid #1f3a4a;
            border-radius: 30px;
            padding: 6px 20px;
            font-size: 14px;
            color: #a0b8c9;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 0.5px;
        }
        .theme-toggle:hover {
            background: #1f3a4a;
            color: #e8edf0;
        }

        /* Прогресс-бар в морском стиле */
        .progress-section {
            background: #0d1f30;
            border: 1px solid #1f3a4a;
            border-radius: 40px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .progress-label {
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 15px;
            color: #7a9aa8;
        }

        .progress-bar-bg {
            flex: 2;
            min-width: 100px;
            height: 6px;
            background: #1a3142;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #b8c9b0;          /* цвет старой карты */
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-weight: 600;
            font-size: 18px;
            color: #b8c9b0;
            min-width: 50px;
            text-align: right;
        }

        /* ----- СТИЛИ ПУНКТОВ ЧЕК-ЛИСТА (строгие) ----- */
        .category {
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: #7a9aa8;
            border-bottom: 1px solid #1a3142;
            padding-bottom: 8px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
        }

        .category-title .badge {
            font-size: 13px;
            font-weight: 300;
            background: #1a3142;
            padding: 0 14px;
            border-radius: 30px;
            color: #a0b8c9;
        }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 10px 0 10px 6px;
            border-bottom: 1px solid rgba(26, 49, 66, 0.4);
            cursor: pointer;
            transition: 0.2s;
        }

        .check-item:hover {
            background: rgba(26, 49, 66, 0.3);
            margin: 0 -12px;
            padding-left: 18px;
            padding-right: 12px;
            border-radius: 6px;
        }

        .check-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: #7a9aa8;
            cursor: pointer;
            flex-shrink: 0;
            border: 1px solid #2a4a5a;
            background: #0d1f30;
        }

        .check-item .item-text {
            font-size: 16px;
            font-weight: 300;
            line-height: 1.4;
            color: #d6e3e8;
        }

        .check-item .item-text .note {
            display: block;
            font-size: 13px;
            color: #4d7a8f;
            margin-top: 2px;
            font-weight: 200;
        }

        /* Кнопка сброса */
        .reset-btn {
            background: transparent;
            border: 1px solid #1f3a4a;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 1px;
            color: #7a9aa8;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            width: 100%;
        }

        .reset-btn:hover {
            background: #1f3a4a;
            color: #e8edf0;
        }

        /* подвал */
        .footer-note {
            margin-top: 30px;
            font-size: 13px;
            color: #2a4a5a;
            text-align: center;
            border-top: 1px solid #1a3142;
            padding-top: 20px;
            letter-spacing: 1px;
        }

        /* ----- ТЁМНАЯ ТЕМА (почти такая же, но чуть светлее для контраста) ----- */
        body.light .app .map-side {
            background: #dce6ed;
            background-image: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.02) 0%, transparent 60%);
            border-right-color: #b0c4d0;
        }
        body.light .app .map-side .map-content h2,
        body.light .app .map-side .map-content p {
            color: #1f3a4a;
        }
        body.light .app .map-side .map-content .route {
            color: #4d6a7a;
        }
        body.light .checklist-side {
            background: #eef3f7;
        }
        body.light .checklist-header {
            border-bottom-color: #c0d0da;
        }
        body.light .checklist-header h1 {
            color: #1f3a4a;
        }
        body.light .checklist-header h1 span {
            color: #4d7a8f;
        }
        body.light .theme-toggle {
            border-color: #b0c4d0;
            color: #2a4a5a;
        }
        body.light .theme-toggle:hover {
            background: #c0d0da;
            color: #0b1a2a;
        }
        body.light .progress-section {
            background: #dce6ed;
            border-color: #b0c4d0;
        }
        body.light .progress-label {
            color: #2a4a5a;
        }
        body.light .progress-bar-bg {
            background: #c0d0da;
        }
        body.light .progress-bar-fill {
            background: #1f3a4a;
        }
        body.light .progress-text {
            color: #1f3a4a;
        }
        body.light .category-title {
            color: #2a4a5a;
            border-bottom-color: #c0d0da;
        }
        body.light .category-title .badge {
            background: #c0d0da;
            color: #1f3a4a;
        }
        body.light .check-item {
            border-bottom-color: #d0dce5;
        }
        body.light .check-item .item-text {
            color: #1a2e3a;
        }
        body.light .check-item .item-text .note {
            color: #4d7a8f;
        }
        body.light .check-item:hover {
            background: rgba(192, 208, 218, 0.3);
        }
        body.light .reset-btn {
            border-color: #b0c4d0;
            color: #2a4a5a;
        }
        body.light .reset-btn:hover {
            background: #c0d0da;
            color: #0b1a2a;
        }
        body.light .footer-note {
            color: #7a9aa8;
            border-top-color: #c0d0da;
        }

        /* ----- АДАПТИВНОСТЬ: на узких экранах карта уходит вверх ----- */
        @media (max-width: 780px) {
            .app { flex-direction: column; }
            .map-side {
                border-right: none;
                border-bottom: 2px solid #1f3a4a;
                min-height: 240px;
                padding: 30px 20px;
            }
            .checklist-side {
                padding: 30px 20px;
            }
            .map-side::before,
            .map-side::after {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ЛЕВАЯ ЧАСТЬ: МОРСКАЯ КАРТА -->
        <div class="map-side">
            <div class="map-content">
                <span class="ship-icon">⛴️</span>
                <h2>За полярным кругом</h2>
                <p>Мурманск • Соловки • Териберка</p>
                <p style="font-size: 14px; margin-top: 8px; opacity: 0.6;">11–15 июля 2026</p>
                <div class="route">
                    <span>⚓ Санкт-Петербург</span> → 
                    <span>🐚 Кемь</span> → 
                    <span>⛪ Соловки</span> → 
                    <span>🌊 Териберка</span>
                </div>
            </div>
        </div>

        <!-- ПРАВАЯ ЧАСТЬ: ЧЕК-ЛИСТ -->
        <div class="checklist-side">
            <!-- Шапка -->
            <div class="checklist-header">
                <h1>⚓ <span>Судовой</span> журнал</h1>
                <button class="theme-toggle" id="themeToggle">☀️ Светлая карта</button>
            </div>

            <!-- Прогресс -->
            <div class="progress-section">
                <span class="progress-label">◈ готовность</span>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <span class="progress-text" id="progressText">0%</span>
            </div>

            <!-- ЧЕК-ЛИСТ -->
            <form id="checklistForm">
                <!-- Категория 1 -->
                <div class="category">
                    <div class="category-title">📜 Документы <span class="badge">4</span></div>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Паспорта РФ</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Медицинские полисы</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Билеты и ваучеры <span class="note">распечатать</span></span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Наличные + карты</span></label>
                </div>

                <!-- Категория 2 -->
                <div class="category">
                    <div class="category-title">🧥 Снаряжение <span class="badge">6</span></div>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Термобельё (2 комплекта)</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Флисовая кофта</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Дождевик Fancy Armor</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Шапка, бафф, перчатки</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Кроссовки + запасные</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Чехлы-бахилы для обуви</span></label>
                </div>

                <!-- Категория 3 -->
                <div class="category">
                    <div class="category-title">🎒 Техника <span class="badge">5</span></div>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Пауэрбанк + зарядки</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Термос 0.5–1 л</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Репеллент от комаров</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Чехол для телефона</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Фотоаппарат + батареи</span></label>
                </div>

                <!-- Категория 4 -->
                <div class="category">
                    <div class="category-title">💊 Аптечка <span class="badge">5</span></div>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Индивидуальные лекарства</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">От укачивания (Драмина)</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Пластыри от мозолей</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Антигистаминные + Полисорб</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Зубные щётки, паста, салфетки</span></label>
                </div>

                <!-- Категория 5 -->
                <div class="category">
                    <div class="category-title">🍎 Провизия <span class="badge">4</span></div>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Чай, кофе, сахар</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Злаковые батончики, орехи</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Печенье, шоколад</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Соки + яблоки</span></label>
                </div>
            </form>

            <button class="reset-btn" id="resetBtn">⟳ Сбросить все метки</button>
            <div class="footer-note">● бортовой журнал ● сборы завершены</div>
        </div>
    </div>

    <script>
        (function() {
            // --- ТЕМА ---
            const toggleBtn = document.getElementById('themeToggle');
            const body = document.body;

            function setTheme(theme) {
                if (theme === 'light') {
                    body.classList.add('light');
                    toggleBtn.textContent = '🌙 Тёмная карта';
                } else {
                    body.classList.remove('light');
                    toggleBtn.textContent = '☀️ Светлая карта';
                }
                localStorage.setItem('theme', theme);
            }

            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') setTheme('light');

            toggleBtn.addEventListener('click', function() {
                setTheme(body.classList.contains('light') ? 'dark' : 'light');
            });

            // --- ПРОГРЕСС ---
            const checkboxes = document.querySelectorAll('#checklistForm input[type="checkbox"]');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');

            function updateProgress() {
                const total = checkboxes.length;
                const checked = document.querySelectorAll('#checklistForm input[type="checkbox"]:checked').length;
                const percent = total === 0 ? 0 : Math.round((checked / total) * 100);
                progressFill.style.width = percent + '%';
                progressText.textContent = percent + '%';
            }

            checkboxes.forEach(cb => cb.addEventListener('change', updateProgress));

            // --- СБРОС ---
            document.getElementById('resetBtn').addEventListener('click', function() {
                if (confirm('Сбросить все галочки?')) {
                    checkboxes.forEach(cb => cb.checked = false);
                    updateProgress();
                }
            });

            updateProgress();
        })();
    </script>
</body>
</html>
</script>

</body>
</html>
