<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
    <title>Чек-лист сборов • Наше северное приключение</title>
    <style>
        /* ----- БАЗА ----- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: #eef3f7;
            font-family: 'Segoe UI', 'Roboto', 'Georgia', system-ui, sans-serif;
            color: #1a2e3a;
            font-size: 18px;
            line-height: 1.7;
            scroll-behavior: smooth;
            padding-top: 60px; /* место для меню */
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== МЕНЮ (как на главной) ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 26, 46, 0.92);
            backdrop-filter: blur(12px);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: none;
        }

        .navbar .logo {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            color: #d6e3e8;
            text-decoration: none;
            white-space: nowrap;
        }
        .navbar .logo span {
            color: #7a9aa8;
            font-weight: 200;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            list-style: none;
        }

        .nav-links a {
            color: #a0b8c9;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            padding: 6px 14px;
            border-radius: 30px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.04);
            color: #e8edf0;
        }

        .nav-links a.active {
            color: #e8edf0;
            background: rgba(255,255,255,0.06);
        }

        .burger {
            display: none;
            flex-direction: column;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
        }
        .burger span {
            display: block;
            width: 26px;
            height: 2px;
            background: #a0b8c9;
            border-radius: 4px;
            transition: 0.3s;
        }

        /* ===== ШАПКА СТРАНИЦЫ ===== */
        .page-header {
            background: #0a1a2e;
            padding: 40px 20px 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .page-header h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 300;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #ffffff;
        }

        .page-header .sub {
            font-size: clamp(1rem, 1.6vw, 1.2rem);
            font-weight: 200;
            color: #7a9aa8;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }

        /* ===== ЧЕК-ЛИСТ (без лишних отступов) ===== */
        .checklist-section {
            background: #ffffff;
            padding: 40px 20px 50px;
            border-radius: 0 0 24px 24px;
            margin-bottom: 20px;
        }

        .checklist-section .container {
            max-width: 820px;
        }

        /* ===== ВЕРТИКАЛЬНАЯ ШКАЛА ПРОГРЕССА (правый нижний угол) ===== */
          .progress-vertical-wrapper {
        position: fixed;
        bottom: 100px;
        right: 24px;
        z-index: 500;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: 44px;
        height: 320px;
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(8px);
        border-radius: 30px;
        padding: 16px 6px 14px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        border: 1px solid rgba(255,255,255,0.2);
        transition: opacity 0.3s;
    }  
        .progress-vertical-label {
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: #3a5f7a;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.1;
            writing-mode: vertical-lr;
            text-orientation: mixed;
            opacity: 0.6;
            flex-shrink: 0;
        }

        .progress-vertical-bg {
            flex: 1;
            width: 6px;
            background: #dce6ed;
            border-radius: 12px;
            position: relative;
            overflow: visible;
            min-height: 40px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.04);
        }

        .progress-vertical-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: #3a5f7a;
            border-radius: 12px;
            transition: height 0.3s ease;
        }

        .progress-vertical-text {
            font-size: 1rem;
            font-weight: 600;
            color: #0a1a2e;
            text-align: center;
            line-height: 1.2;
            flex-shrink: 0;
            min-width: 32px;
        }

        /* ===== КАТЕГОРИИ (без изменений) ===== */
        .category {
            margin-bottom: 34px;
        }

        .category-title {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #0a1a2e;
            border-bottom: 1px solid #dce6ed;
            padding-bottom: 8px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
        }

        .category-title .badge {
            font-size: 0.8rem;
            font-weight: 200;
            background: #dce6ed;
            padding: 0 14px;
            border-radius: 30px;
            color: #3a5f7a;
        }

        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 10px 0 10px 6px;
            border-bottom: 1px solid rgba(0,0,0,0.02);
            cursor: pointer;
            transition: 0.2s;
        }

        .check-item:hover {
            background: #f5f8fa;
            margin: 0 -12px;
            padding-left: 18px;
            padding-right: 12px;
            border-radius: 8px;
        }

        .check-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 3px;
            accent-color: #3a5f7a;
            cursor: pointer;
            flex-shrink: 0;
        }

        .check-item .item-text {
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.4;
            color: #1a2e3a;
        }

        .check-item .item-text .note {
            display: block;
            font-size: 0.85rem;
            color: #4d7a8f;
            margin-top: 2px;
            font-weight: 200;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #c8d8e0;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            color: #3a5f7a;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 16px;
            width: 100%;
        }

        .reset-btn:hover {
            background: #eef3f7;
            border-color: #7a9aa8;
            color: #0a1a2e;
        }

        /* ===== ПОДВАЛ ===== */
        .footer {
            background: #0a1a2e;
            padding: 30px 20px;
            text-align: center;
            font-size: 0.85rem;
            color: #4d7a8f;
            letter-spacing: 0.05em;
            border-top: 1px solid rgba(255,255,255,0.02);
            position: relative;
            z-index: 10;
        }

        /* ===== АДАПТАЦИЯ ДЛЯ МОБИЛЬНЫХ ===== */
        @media (max-width: 680px) {
            body { padding-top: 56px; }
            .navbar { height: 56px; padding: 0 16px; }

            .burger { display: flex; }

            .nav-links {
                position: absolute;
                top: 56px;
                left: 0;
                right: 0;
                flex-direction: column;
                background: rgba(10, 26, 46, 0.98);
                backdrop-filter: blur(16px);
                padding: 16px 20px 20px;
                gap: 4px;
                display: none;
            }
            .nav-links.open {
                display: flex;
            }
            .nav-links a {
                padding: 10px 16px;
                width: 100%;
                text-align: center;
            }

            .page-header {
                padding: 30px 16px 24px;
            }
            .checklist-section {
                padding: 30px 16px 40px;
            }

            /* Шкала на телефоне — компактнее */
            .progress-vertical-wrapper {
                bottom: 80px;
                right: 12px;
                width: 36px;
                height: 220px;
                padding: 10px 4px 8px;
                border-radius: 20px;
            }
            .progress-vertical-label {
                font-size: 0.5rem;
            }
            .progress-vertical-bg {
                width: 4px;
            }
            .progress-vertical-text {
                font-size: 0.8rem;
                min-width: 28px;
            }
        }

        @media (max-width: 420px) {
            .progress-vertical-wrapper {
                bottom: 60px;
                right: 8px;
                width: 30px;
                height: 160px;
                padding: 8px 3px 6px;
                border-radius: 16px;
            }
            .progress-vertical-label {
                display: none; /* скрываем надпись, оставляем только процент */
            }
            .progress-vertical-bg {
                width: 3px;
            }
            .progress-vertical-text {
                font-size: 0.7rem;
                min-width: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== МЕНЮ ===== -->
    <nav class="navbar">
        <a href="index.html" class="logo">семейный <span>дневник</span></a>
        <button class="burger" id="burgerBtn" aria-label="Меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Главная</a></li>
            <li><a href="checklist.html" class="active">Чек-лист</a></li>
            <li><a href="diary.html">Дневник</a></li>
            <li><a href="gallery.html">Фото</a></li>
            <li><a href="route.html">Маршрут</a></li>
        </ul>
    </nav>

    <!-- ===== ШАПКА СТРАНИЦЫ ===== -->
    <header class="page-header">
        <h1>Чек-лист сборов</h1>
        <div class="sub">что мы взяли с собой за полярный круг</div>
    </header>

    <!-- ===== ЧЕК-ЛИСТ ===== -->
    <section class="checklist-section">
        <div class="container">

            <!-- ВЕРТИКАЛЬНАЯ ШКАЛА ПРОГРЕССА (в правом нижнем углу) -->
            <div class="progress-vertical-wrapper" id="progressWrapper">
                <span class="progress-vertical-label">готовность</span>
                <div class="progress-vertical-bg">
                    <div class="progress-vertical-fill" id="progressFillVertical"></div>
                </div>
                <span class="progress-vertical-text" id="progressTextVertical">0%</span>
            </div>

            <form id="checklistForm">
                <!-- Категория 1: Документы -->
                <div class="category">
                    <div class="category-title">📜 Документы <span class="badge">4</span></div>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Паспорта РФ</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Медицинские полисы</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Билеты и ваучеры <span class="note">распечатать</span></span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Наличные + карты</span></label>
                </div>

                <!-- Категория 2: Одежда -->
                <div class="category">
                    <div class="category-title">🧥 Одежда и обувь <span class="badge">6</span></div>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Термобельё (2 комплекта)</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Флисовая кофта</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Дождевик Fancy Armor</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Шапка, бафф, перчатки</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Кроссовки + запасные</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Чехлы-бахилы для обуви</span></label>
                </div>

                <!-- Категория 3: Снаряжение -->
                <div class="category">
                    <div class="category-title">🎒 Снаряжение <span class="badge">5</span></div>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Пауэрбанк + зарядки</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Термос 0.5–1 л</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Репеллент от комаров</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Чехол для телефона</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Фотоаппарат + батареи</span></label>
                </div>

                <!-- Категория 4: Аптечка -->
                <div class="category">
                    <div class="category-title">💊 Аптечка <span class="badge">5</span></div>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Индивидуальные лекарства</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">От укачивания (Драмина)</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Пластыри от мозолей</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Антигистаминные + Полисорб</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Зубные щётки, паста, салфетки</span></label>
                </div>

                <!-- Категория 5: Еда -->
                <div class="category">
                    <div class="category-title">🍎 Провизия <span class="badge">4</span></div>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Чай, кофе, сахар</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Злаковые батончики, орехи</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Печенье, шоколад</span></label>
                    <label class="check-item"><input type="checkbox" /> <span class="item-text">Соки + яблоки</span></label>
                </div>
            </form>

            <button class="reset-btn" id="resetBtn">⟳ Сбросить все метки</button>

        </div>
    </section>

    <!-- ===== ПОДВАЛ ===== -->
    <footer class="footer">
        <div class="container">
            ● сделано с любовью ● июль 2026
        </div>
    </footer>

    <script>
        (function() {
            // --- БУРГЕР ---
            const burgerBtn = document.getElementById('burgerBtn');
            const navLinks = document.getElementById('navLinks');

            burgerBtn.addEventListener('click', function() {
                navLinks.classList.toggle('open');
            });

            navLinks.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', function() {
                    navLinks.classList.remove('open');
                });
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.navbar')) {
                    navLinks.classList.remove('open');
                }
            });

            // --- ПРОГРЕСС (вертикальная шкала) ---
            const checkboxes = document.querySelectorAll('#checklistForm input[type="checkbox"]');
            const progressFill = document.getElementById('progressFillVertical');
            const progressText = document.getElementById('progressTextVertical');

            function updateProgress() {
                const total = checkboxes.length;
                const checked = document.querySelectorAll('#checklistForm input[type="checkbox"]:checked').length;
                const percent = total === 0 ? 0 : Math.round((checked / total) * 100);
                progressFill.style.height = percent + '%';
                progressText.textContent = percent + '%';
            }

            checkboxes.forEach(cb => cb.addEventListener('change', updateProgress));

            // --- СБРОС ---
            document.getElementById('resetBtn').addEventListener('click', function() {
                if (confirm('Точно сбросить все галочки?')) {
                    checkboxes.forEach(cb => cb.checked = false);
                    updateProgress();
                }
            });

            updateProgress();
        })();
    </script>
</body>
</html>
