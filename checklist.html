<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Чек-лист: сборы в Мурманск</title>
    <style>
        /* ----- Общие стили (светлая тема по умолчанию) ----- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f5f0eb;
            color: #1e2d1e;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 35px 30px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
        }

        /* ----- Шапка и навигация ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid #d4d4d4;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 15px;
            cursor: pointer;
            background: #f5f0eb;
            transition: 0.2s;
        }
        .theme-toggle:hover {
            background: #e5dfd8;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            margin: 16px 0 24px 0;
            padding-top: 14px;
            border-top: 1px solid #e5dfd8;
        }
        .nav-links a {
            color: #2d6a4f;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            transition: 0.15s;
        }
        .nav-links a:hover {
            border-bottom-color: #2d6a4f;
        }
        .nav-links .active {
            border-bottom-color: #2d6a4f;
        }

        /* ----- Прогресс-бар ----- */
        .progress-section {
            background: #f5f0eb;
            border-radius: 40px;
            padding: 16px 22px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .progress-bar-bg {
            flex: 1;
            min-width: 140px;
            height: 10px;
            background: #d9d0c8;
            border-radius: 40px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: #2d6a4f;
            border-radius: 40px;
            transition: width 0.25s ease;
        }
        .progress-text {
            font-weight: 700;
            font-size: 18px;
            color: #2d6a4f;
            white-space: nowrap;
        }

        /* ----- Категории чек-листа ----- */
        .category {
            margin-bottom: 28px;
        }
        .category-title {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .category-title .badge {
            font-size: 14px;
            font-weight: 600;
            background: #e5dfd8;
            padding: 2px 14px;
            border-radius: 40px;
            color: #3d3d3d;
        }

        /* ----- Каждый пункт чек-листа ----- */
        .check-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 10px 0;
            border-bottom: 1px solid #f0ebe6;
            cursor: pointer;
            transition: 0.1s;
        }
        .check-item:hover {
            background: #faf8f6;
            margin: 0 -8px;
            padding-left: 8px;
            padding-right: 8px;
            border-radius: 12px;
        }

        .check-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 2px;
            accent-color: #2d6a4f;
            cursor: pointer;
            flex-shrink: 0;
        }

        .check-item .item-text {
            font-size: 16px;
            line-height: 1.45;
            color: #1e2d1e;
        }
        .check-item .item-text .note {
            font-size: 14px;
            color: #6b7f6b;
            display: block;
            margin-top: 2px;
        }

        /* ----- Кнопка сброса ----- */
        .reset-btn {
            background: none;
            border: 1px solid #d4cbc2;
            border-radius: 40px;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: 600;
            color: #3d3d3d;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 8px;
            width: 100%;
        }
        .reset-btn:hover {
            background: #f0ebe6;
        }

        /* ----- Тёмная тема ----- */
        body.dark {
            background: #0f1a14;
            color: #e8f5e9;
        }
        body.dark .container {
            background: #152418;
        }
        body.dark .theme-toggle {
            background: #1e2d1e;
            border-color: #3d5a3d;
            color: #e8f5e9;
        }
        body.dark .theme-toggle:hover {
            background: #2a3d2e;
        }
        body.dark .nav-links {
            border-top-color: #2a3d2e;
        }
        body.dark .nav-links a {
            color: #6ee7b7;
        }
        body.dark .progress-section {
            background: #1e2d1e;
        }
        body.dark .progress-bar-bg {
            background: #3d5a3d;
        }
        body.dark .progress-text {
            color: #6ee7b7;
        }
        body.dark .check-item {
            border-bottom-color: #2a3d2e;
        }
        body.dark .check-item:hover {
            background: #1e2d1e;
        }
        body.dark .check-item .item-text {
            color: #e8f5e9;
        }
        body.dark .check-item .item-text .note {
            color: #95b89e;
        }
        body.dark .reset-btn {
            border-color: #3d5a3d;
            color: #e8f5e9;
        }
        body.dark .reset-btn:hover {
            background: #1e2d1e;
        }
        body.dark .category-title .badge {
            background: #1e2d1e;
            color: #95b89e;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ШАПКА -->
    <div class="header">
        <h1>🧳 Чек-лист сборов</h1>
        <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
    </div>

    <!-- НАВИГАЦИЯ (как на вашем прошлом сайте) -->
    <div class="nav-links">
        <a href="#" class="active">📋 Чек-лист</a>
        <a href="#">📖 Дневник поездки</a>
        <a href="#">📍 Маршрут</a>
        <a href="#">📸 Фото</a>
    </div>

    <!-- ПРОГРЕСС -->
    <div class="progress-section">
        <span style="font-weight:600;">Готовность</span>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <span class="progress-text" id="progressText">0%</span>
    </div>

    <!-- ЧЕК-ЛИСТ -->
    <form id="checklistForm">

        <!-- === КАТЕГОРИЯ 1: Документы === -->
        <div class="category">
            <div class="category-title">
                📄 Документы и деньги
                <span class="badge">4</span>
            </div>

            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Паспорта РФ (ваш и мамы)</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Медицинские полисы</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Билеты и ваучеры (распечатать)</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Наличные + банковские карты</span>
            </label>
        </div>

        <!-- === КАТЕГОРИЯ 2: Одежда === -->
        <div class="category">
            <div class="category-title">
                👕 Одежда и обувь
                <span class="badge">6</span>
            </div>

            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Термобельё (2 комплекта)</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Флисовая кофта</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Дождевик Fancy Armor</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Шапка, бафф, перчатки</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Основные кроссовки + запасные</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Чехлы-бахилы для обуви</span>
            </label>
        </div>

        <!-- === КАТЕГОРИЯ 3: Снаряжение === -->
        <div class="category">
            <div class="category-title">
                🎒 Снаряжение и электроника
                <span class="badge">5</span>
            </div>

            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Пауэрбанк + зарядки</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Термос (0.5–1 л)</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Репеллент от комаров</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Непромокаемый чехол для телефона</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Фотоаппарат + запасные батареи</span>
            </label>
        </div>

        <!-- === КАТЕГОРИЯ 4: Аптечка и гигиена === -->
        <div class="category">
            <div class="category-title">
                💊 Аптечка и гигиена
                <span class="badge">5</span>
            </div>

            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Индивидуальные лекарства</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">От укачивания (Драмина)</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Пластыри от мозолей (Compeed)</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Антигистаминные + Полисорб</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Зубные щётки, паста, салфетки</span>
            </label>
        </div>

        <!-- === КАТЕГОРИЯ 5: Еда === -->
        <div class="category">
            <div class="category-title">
                🍎 Еда и перекусы
                <span class="badge">4</span>
            </div>

            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Чай, кофе, сахар</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Злаковые батончики, орехи, сухофрукты</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Печенье, шоколад</span>
            </label>
            <label class="check-item">
                <input type="checkbox" />
                <span class="item-text">Соки в тетрапаках + яблоки</span>
            </label>
        </div>

    </form>

    <!-- КНОПКА СБРОСА -->
    <button class="reset-btn" id="resetBtn">🔄 Сбросить все галочки</button>

    <p style="margin-top: 28px; font-size: 14px; color: #6b7f6b; text-align: center; border-top: 1px solid #e5dfd8; padding-top: 18px;">
        ✨ Собираемся в Мурманск • 11–15 июля 2026
    </p>
</div>

<script>
    (function() {
        // --- Переключение темы ---
        const toggleBtn = document.getElementById('themeToggle');
        const body = document.body;

        function setTheme(theme) {
            if (theme === 'dark') {
                body.classList.add('dark');
                toggleBtn.textContent = '☀️ Светлая';
            } else {
                body.classList.remove('dark');
                toggleBtn.textContent = '🌙 Тёмная';
            }
            localStorage.setItem('theme', theme);
        }

        // Загружаем сохранённую тему
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            setTheme('dark');
        }

        toggleBtn.addEventListener('click', function() {
            const isDark = body.classList.contains('dark');
            setTheme(isDark ? 'light' : 'dark');
        });

        // --- Прогресс ---
        const checkboxes = document.querySelectorAll('#checklistForm input[type="checkbox"]');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        function updateProgress() {
            const total = checkboxes.length;
            const checked = document.querySelectorAll('#checklistForm input[type="checkbox"]:checked').length;
            const percent = total === 0 ? 0 : Math.round((checked / total) * 100);
            progressFill.style.width = percent + '%';
            progressText.textContent = percent + '%';
        }

        // Обновляем прогресс при каждом изменении
        checkboxes.forEach(cb => {
            cb.addEventListener('change', updateProgress);
        });

        // --- Сброс ---
        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('Точно сбросить все галочки?')) {
                checkboxes.forEach(cb => cb.checked = false);
                updateProgress();
            }
        });

        // --- Инициализация ---
        updateProgress();

    })();
</script>

</body>
</html>
