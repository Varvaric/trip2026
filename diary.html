<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
    <title>Дневник • Наше северное приключение</title>
    <style>
        /* ----- БАЗА (морская гамма) ----- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: #eef3f7;
            font-family: 'Segoe UI', 'Roboto', 'Georgia', system-ui, sans-serif;
            color: #1a2e3a;
            font-size: 18px;
            line-height: 1.7;
            scroll-behavior: smooth;
            padding-top: 60px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== МЕНЮ (как на других страницах) ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 26, 46, 0.92);
            backdrop-filter: blur(12px);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: none;
        }

        .navbar .logo {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            color: #d6e3e8;
            text-decoration: none;
            white-space: nowrap;
        }
        .navbar .logo span {
            color: #7a9aa8;
            font-weight: 200;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            list-style: none;
        }

        .nav-links a {
            color: #a0b8c9;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            padding: 6px 14px;
            border-radius: 30px;
            transition: 0.2s;
            white-space: nowrap;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.04);
            color: #e8edf0;
        }

        .nav-links a.active {
            color: #e8edf0;
            background: rgba(255,255,255,0.06);
        }

        .burger {
            display: none;
            flex-direction: column;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
        }
        .burger span {
            display: block;
            width: 26px;
            height: 2px;
            background: #a0b8c9;
            border-radius: 4px;
            transition: 0.3s;
        }

        /* ===== ШАПКА СТРАНИЦЫ ===== */
        .page-header {
            background: #0a1a2e;
            padding: 40px 20px 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .page-header h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 300;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #ffffff;
        }

        .page-header .sub {
            font-size: clamp(1rem, 1.6vw, 1.2rem);
            font-weight: 200;
            color: #7a9aa8;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }

        /* ===== НАВИГАЦИЯ ПО ДНЯМ ===== */
        .diary-nav {
            background: #ffffff;
            padding: 16px 24px;
            border-bottom: 1px solid #dce6ed;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .diary-nav .nav-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .diary-nav .nav-buttons button {
            background: #eef3f7;
            border: 1px solid #dce6ed;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 0.85rem;
            color: #1a2e3a;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .diary-nav .nav-buttons button:hover {
            background: #dce6ed;
            border-color: #7a9aa8;
        }

        .diary-nav .day-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 300;
            color: #3a5f7a;
        }

        .diary-nav .day-selector select {
            background: #ffffff;
            border: 1px solid #dce6ed;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 0.9rem;
            color: #1a2e3a;
            cursor: pointer;
            font-family: inherit;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
            padding-right: 40px;
        }

        .diary-nav .day-selector select:focus {
            outline: none;
            border-color: #3a5f7a;
        }

        /* ===== ДНЕВНИКОВЫЕ ЗАПИСИ (сетка 2 колонки) ===== */
        .diary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 40px 0 50px;
        }

        /* Карточка дня */
        .day-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 24px 24px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.02);
            transition: box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .day-card:hover {
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }

        /* Шапка дня: дата, погода, номер */
        .day-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #eef3f7;
            padding-bottom: 10px;
        }

        .day-header .day-date {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.04em;
            color: #0a1a2e;
        }

        .day-header .day-date .day-num {
            font-weight: 200;
            color: #7a9aa8;
            font-size: 0.85rem;
            margin-left: 6px;
        }

        .day-header .weather-icons {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
}

.day-header .weather-icons .weather-btn {
    background: none;
    border: 1px solid #dce6ed;
    border-radius: 30px;
    padding: 2px 8px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: 0.2s;
    line-height: 1.4;
}

.day-header .weather-icons .weather-btn:hover {
    background: #eef3f7;
    border-color: #7a9aa8;
}

.day-header .weather-icons .weather-btn.active {
    background: #dce6ed;
    border-color: #3a5f7a;
    box-shadow: 0 0 0 1px #3a5f7a;
}
        /* Фото в дневнике (1–2 шт) */
        .day-photos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .day-photos .photo-placeholder {
            background: #eef3f7;
            border-radius: 14px;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #7a9aa8;
            font-weight: 200;
            border: 2px dashed rgba(58, 95, 122, 0.1);
            transition: 0.2s;
            cursor: pointer;
        }

        .day-photos .photo-placeholder:hover {
            border-color: #7a9aa8;
            background: #dce6ed;
        }

        .day-photos .photo-placeholder .plus {
            font-size: 1.6rem;
            font-weight: 100;
            display: block;
        }

        /* Текстовая область для записей */
        .day-text {
            width: 100%;
            min-height: 120px;
            padding: 12px 14px;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #1a2e3a;
            background: #f8fafb;
            border: 1px solid #dce6ed;
            border-radius: 14px;
            resize: vertical;
            transition: border 0.2s;
        }

        .day-text:focus {
            outline: none;
            border-color: #7a9aa8;
            background: #ffffff;
        }

        .day-text::placeholder {
            color: #a0b8c9;
            font-weight: 200;
            font-size: 0.9rem;
        }

        /* Разделитель между днями (декоративный) */
        .diary-divider {
            grid-column: 1 / -1;
            text-align: center;
            padding: 10px 0 4px;
            color: #c8d8e0;
            font-size: 1.2rem;
            letter-spacing: 0.4em;
            border-top: 1px solid #dce6ed;
            margin-top: 8px;
        }

        /* ===== ПОДВАЛ ===== */
        .footer {
            background: #0a1a2e;
            padding: 30px 20px;
            text-align: center;
            font-size: 0.85rem;
            color: #4d7a8f;
            letter-spacing: 0.05em;
            border-top: 1px solid rgba(255,255,255,0.02);
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 992px) {
            .diary-grid {
                grid-template-columns: 1fr 1fr;
                gap: 24px;
            }
        }

        @media (max-width: 768px) {
            .diary-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .diary-nav {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .diary-nav .nav-buttons {
                justify-content: center;
            }
            .diary-nav .day-selector {
                justify-content: center;
            }
            .day-photos {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .day-photos {
                grid-template-columns: 1fr;
            }
            .day-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .day-header .weather-icons {
                margin-top: 4px;
            }
        }

        /* Бургер-меню (как на других страницах) */
        @media (max-width: 680px) {
            body { padding-top: 56px; }
            .navbar { height: 56px; padding: 0 16px; }

            .burger { display: flex; }

            .nav-links {
                position: absolute;
                top: 56px;
                left: 0;
                right: 0;
                flex-direction: column;
                background: rgba(10, 26, 46, 0.98);
                backdrop-filter: blur(16px);
                padding: 16px 20px 20px;
                gap: 4px;
                display: none;
            }
            .nav-links.open {
                display: flex;
            }
            .nav-links a {
                padding: 10px 16px;
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- ===== МЕНЮ ===== -->
    <nav class="navbar">
        <a href="index.html" class="logo">семейный <span>дневник</span></a>
        <button class="burger" id="burgerBtn" aria-label="Меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Главная</a></li>
            <li><a href="checklist.html">Чек-лист</a></li>
            <li><a href="diary.html" class="active">Дневник</a></li>
            <li><a href="gallery.html">Фото</a></li>
            <li><a href="route.html">Маршрут</a></li>
        </ul>
    </nav>

    <!-- ===== ШАПКА ===== -->
    <header class="page-header">
        <h1>Дневник путешествия</h1>
        <div class="sub">каждый день — новая страница</div>
    </header>

    <!-- ===== НАВИГАЦИЯ ПО ДНЯМ ===== -->
    <div class="diary-nav" id="diaryNav">
        <div class="nav-buttons">
            <button id="prevDayBtn">← Пред. день</button>
            <button id="nextDayBtn">След. день →</button>
        </div>
        <div class="day-selector">
            <span>Перейти к дню:</span>
            <select id="daySelect"></select>
        </div>
    </div>

    <!-- ===== ДНЕВНИК ===== -->
    <section class="container">
        <div class="diary-grid" id="diaryGrid">
            <!-- Дни будут вставлены через JavaScript -->
        </div>
    </section>

    <!-- ===== ПОДВАЛ ===== -->
    <footer class="footer">
        <div class="container">
            ● сделано с любовью ● июль 2026
        </div>
    </footer>

    <script>
    (function() {
        // --- ДАННЫЕ ДНЕЙ ---
        const daysData = [
            { id: 'day0', date: '10 июля', dayNum: 'День 0' },
            { id: 'day1', date: '11 июля', dayNum: 'День 1' },
            { id: 'day2', date: '12 июля', dayNum: 'День 2' },
            { id: 'day3', date: '13 июля', dayNum: 'День 3' },
            { id: 'day4', date: '14 июля', dayNum: 'День 4' },
            { id: 'day5', date: '15 июля', dayNum: 'День 5' },
            { id: 'day6', date: '16 июля', dayNum: 'День 6' },
            { id: 'day7', date: '17 июля', dayNum: 'День 7' }
        ];

        // Заглушки текста
        const placeholderTexts = {
            'day0': 'Вечером мы сели в поезд на Ладожском вокзале. Впереди — целая неделя приключений...',
            'day1': 'Прибыли в Кемь, встретили гида. Переправа на Соловки. Первое впечатление от Белого моря...',
            'day2': 'Заяцкий остров — каменные лабиринты и древние святилища. Гора Секирная — дух захватывает от вида...',
            'day3': 'Экскурсия по Соловецкому лагерю. Обед. Отъезд в Мурманск. Ночь в поезде...',
            'day4': 'Териберка! Море, ветер, киты. Мы стояли на краю земли и смотрели на Баренцево море...',
            'day5': 'Мурманск: ледокол Ленин, краеведческий музей. Город-герой, город-порт...',
            'day6': 'Группа уехала. Мы остались вдвоём. Заселились в квартиру и пошли гулять по Мурманску...',
            'day7': 'Последний день. Свободное плавание. Вечером — отъезд в Петербург...'
        };

        // --- ГЕНЕРАЦИЯ КАРТОЧЕК ---
        const grid = document.getElementById('diaryGrid');
        const daySelect = document.getElementById('daySelect');

        // Список иконок погоды (можно менять и добавлять)
        const weatherSymbols = ['☀️', '⛅', '🌧️', '🌨️', '🌊', '🌤️', '💨', '❄️', '🌫️'];

        daysData.forEach((day, index) => {
            const card = document.createElement('div');
            card.className = 'day-card';
            card.id = day.id;
            card.dataset.index = index;

            // --- ШАПКА ---
            const header = document.createElement('div');
            header.className = 'day-header';

            const dateSpan = document.createElement('span');
            dateSpan.className = 'day-date';
            dateSpan.innerHTML = `${day.date} <span class="day-num">${day.dayNum}</span>`;

            const weatherDiv = document.createElement('div');
            weatherDiv.className = 'weather-icons';

            // Создаём кнопки для каждой иконки погоды
            weatherSymbols.forEach(sym => {
                const btn = document.createElement('button');
                btn.className = 'weather-btn';
                btn.textContent = sym;
                btn.type = 'button';
                btn.dataset.dayId = day.id;

                // Клик — переключаем активный класс
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.classList.toggle('active');
                    saveWeather(day.id);
                });

                weatherDiv.appendChild(btn);
            });

            header.appendChild(dateSpan);
            header.appendChild(weatherDiv);
            card.appendChild(header);

            // --- ФОТО ---
            const photosDiv = document.createElement('div');
            photosDiv.className = 'day-photos';
            for (let i = 0; i < 2; i++) {
                const placeholder = document.createElement('div');
                placeholder.className = 'photo-placeholder';
                placeholder.innerHTML = `<span class="plus">+</span> фото`;
                placeholder.addEventListener('click', function() {
                    alert('Сюда можно будет загрузить фото. Пока просто напоминание.');
                });
                photosDiv.appendChild(placeholder);
            }
            card.appendChild(photosDiv);

            // --- ТЕКСТ ---
            const textarea = document.createElement('textarea');
            textarea.className = 'day-text';
            textarea.placeholder = 'Напишите свои впечатления о дне...';
            textarea.dataset.dayId = day.id;

            const savedTexts = JSON.parse(localStorage.getItem('diary_texts') || '{}');
            textarea.value = savedTexts[day.id] || placeholderTexts[day.id] || '';

            textarea.addEventListener('input', function() {
                const saved = JSON.parse(localStorage.getItem('diary_texts') || '{}');
                saved[this.dataset.dayId] = this.value;
                localStorage.setItem('diary_texts', JSON.stringify(saved));
            });

            card.appendChild(textarea);
            grid.appendChild(card);

            // --- SELECT ---
            const option = document.createElement('option');
            option.value = day.id;
            option.textContent = `${day.date} (${day.dayNum})`;
            daySelect.appendChild(option);
        });

        // --- ФУНКЦИЯ СОХРАНЕНИЯ ПОГОДЫ ---
        function saveWeather(dayId) {
            const card = document.getElementById(dayId);
            if (!card) return;
            const activeBtns = card.querySelectorAll('.weather-btn.active');
            const selected = Array.from(activeBtns).map(btn => btn.textContent);
            const saved = JSON.parse(localStorage.getItem('diary_weather') || '{}');
            saved[dayId] = selected;
            localStorage.setItem('diary_weather', JSON.stringify(saved));
        }

        // --- ВОССТАНОВЛЕНИЕ ПОГОДЫ ---
        const savedWeather = JSON.parse(localStorage.getItem('diary_weather') || '{}');
        document.querySelectorAll('.day-card').forEach(card => {
            const dayId = card.id;
            const weatherArr = savedWeather[dayId] || [];
            const btns = card.querySelectorAll('.weather-btn');
            btns.forEach(btn => {
                btn.classList.remove('active');
                if (weatherArr.includes(btn.textContent)) {
                    btn.classList.add('active');
                }
            });
        });

        // --- НАВИГАЦИЯ ПО ДНЯМ ---
        const dayCards = document.querySelectorAll('.day-card');
        let currentIndex = 0;

        function scrollToDay(index) {
            if (index < 0) index = 0;
            if (index >= dayCards.length) index = dayCards.length - 1;
            currentIndex = index;
            const card = dayCards[currentIndex];
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                card.style.transition = 'background 0.2s';
                card.style.background = '#dce6ed';
                setTimeout(() => {
                    card.style.background = '';
                }, 600);
            }
            daySelect.value = card.id;
        }

        document.getElementById('prevDayBtn').addEventListener('click', function() {
            scrollToDay(currentIndex - 1);
        });

        document.getElementById('nextDayBtn').addEventListener('click', function() {
            scrollToDay(currentIndex + 1);
        });

        daySelect.addEventListener('change', function() {
            const selectedId = this.value;
            const index = Array.from(dayCards).findIndex(card => card.id === selectedId);
            if (index !== -1) {
                scrollToDay(index);
            }
        });

        // --- БУРГЕР ---
        const burgerBtn = document.getElementById('burgerBtn');
        const navLinks = document.getElementById('navLinks');

        burgerBtn.addEventListener('click', function() {
            navLinks.classList.toggle('open');
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function() {
                navLinks.classList.remove('open');
            });
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.navbar')) {
                navLinks.classList.remove('open');
            }
        });

    })();
</script>
</body>
</html>
